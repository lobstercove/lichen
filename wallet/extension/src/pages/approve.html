<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LichenWallet — Approval</title>
  <link rel="stylesheet" href="../styles/shared-base-styles.css" />
  <link rel="stylesheet" href="../styles/shared-theme.css" />
  <link rel="stylesheet" href="../styles/wallet.css" />
  <link rel="stylesheet" href="../styles/extension-overrides.css" />
  <style>
    .approve-shell { max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    .approve-grid { display: grid; grid-template-columns: 120px 1fr; gap: 0.6rem; font-size: 0.9rem; }
    .approve-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .approve-restriction-status { display: none; margin-top: 1rem; padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.35); color: #bbf7d0; background: rgba(16, 185, 129, 0.1); font-size: 0.85rem; line-height: 1.45; }
    .approve-restriction-status.warning { display: block; border-color: rgba(245, 158, 11, 0.45); color: #fde68a; background: rgba(245, 158, 11, 0.1); }
    .approve-restriction-status.blocked { display: block; border-color: rgba(239, 68, 68, 0.45); color: #fecaca; background: rgba(239, 68, 68, 0.1); }
    .approve-restriction-status.passed { display: block; }
    .mono { font-family: 'JetBrains Mono', monospace; word-break: break-all; }
  </style>
</head>
<body class="wallet-body">
  <main class="approve-shell">
    <section class="wallet-content">
      <h2 style="margin-bottom: 0.5rem;">Connection Request</h2>
      <p class="step-description" style="margin-bottom: 1rem;">Review and approve this dApp request.</p>
      <div style="margin-bottom: 0.8rem;">
        <button id="refreshPendingBtn" class="btn btn-secondary btn-small">Refresh Pending</button>
      </div>
      <div id="pendingRequests" class="approve-grid" style="margin-bottom: 1rem;"></div>
      <div id="approveContent" class="approve-grid"></div>
      <div id="approveRestrictionStatus" class="approve-restriction-status" aria-live="polite"></div>
      <div id="passwordRow" class="form-group" style="margin-top: 1rem; display: none;">
        <label>Password (required for signing)</label>
        <input id="approvePassword" type="password" class="form-input" placeholder="Enter wallet password" />
      </div>
      <div class="approve-actions">
        <button id="approveBtn" class="btn btn-primary">Approve</button>
        <button id="rejectBtn" class="btn btn-secondary">Reject</button>
      </div>
      <div id="approveStatus" class="popup-status" style="margin-top: 0.75rem;"></div>
    </section>
  </main>
  <script src="../../shared/utils.js"></script>
  <script type="module" src="approve.js"></script>
</body>
</html>
