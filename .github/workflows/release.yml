name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_HTTP_TIMEOUT: "120"
  CARGO_NET_RETRY: "10"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  release-quality-gate:
    name: Release quality and security gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify tag matches runtime crate versions
        shell: bash
        run: |
          set -euo pipefail
          expected="${GITHUB_REF_NAME#v}"
          for manifest in \
            core/Cargo.toml \
            validator/Cargo.toml \
            p2p/Cargo.toml \
            rpc/Cargo.toml \
            cli/Cargo.toml \
            custody/Cargo.toml \
            faucet-service/Cargo.toml \
            genesis/Cargo.toml; do
            actual="$(awk -F'"' '/^version = "/ { print $2; exit }' "$manifest")"
            if [ "$actual" != "$expected" ]; then
              echo "$manifest version $actual does not match tag $GITHUB_REF_NAME" >&2
              exit 1
            fi
          done

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: clippy,rustfmt

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run workspace Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace --all-features --locked

      - name: Reclaim workspace test artifacts
        run: cargo clean

      - name: Verify standalone Rust workspaces
        run: |
          set -euo pipefail
          cargo test --manifest-path compiler/Cargo.toml --locked
          cargo clippy --manifest-path compiler/Cargo.toml --all-targets --locked -- -D warnings
          cargo clean --manifest-path compiler/Cargo.toml
          cargo test --manifest-path sdk/Cargo.toml --locked
          cargo clippy --manifest-path sdk/Cargo.toml --all-targets --locked -- -D warnings
          cargo clean --manifest-path sdk/Cargo.toml
          cargo test --manifest-path sdk/rust/Cargo.toml --locked
          cargo clippy --manifest-path sdk/rust/Cargo.toml --all-targets --locked -- -D warnings
          cargo clean --manifest-path sdk/rust/Cargo.toml
          cargo check --manifest-path fuzz/Cargo.toml --locked --bins
          cargo clean --manifest-path fuzz/Cargo.toml

      - name: Install dependency policy tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --version 0.20.2 --locked

      - name: Verify dependency policy
        run: |
          set -euo pipefail
          first_lock=1
          while IFS= read -r lockfile; do
            echo "Auditing ${lockfile}"
            manifest="${lockfile%Cargo.lock}Cargo.toml"
            cargo metadata --locked --no-deps --format-version 1 \
              --manifest-path "$manifest" >/dev/null
            if [ "$first_lock" -eq 1 ]; then
              cargo audit -q -D warnings --file "$lockfile"
              first_lock=0
            else
              cargo audit --no-fetch -q -D warnings --file "$lockfile"
            fi
          done < <(find . -path '*/target' -prune -o -name Cargo.lock -print | sort)
          cargo deny --config deny.toml check advisories licenses sources

      - name: Verify JS and Python dependency policy
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npm audit
          npm --prefix sdk/js ci --ignore-scripts
          npm --prefix sdk/js audit
          bash scripts/qa/test_python_sdk_release_supply_chain.sh

      - name: Verify release policy assets
        run: |
          set -euo pipefail
          node scripts/qa/test_github_actions_supply_chain.js
          node scripts/qa/test_rustsec_advisory_policy.js
          node scripts/qa/test_legacy_bincode_codec_policy.js
          node scripts/qa/test_release_audit_summaries.js
          node scripts/qa/test_release_signer_trust_anchor.js
          node scripts/qa/test_deployment_env_examples.js
          node scripts/qa/test_rust_dependency_policy.js
          node scripts/qa/test_archive_parity_gate_assets.js
          python3 scripts/qa/update-expected-contracts.py --check

  contract-bundle:
    name: Test and build genesis contract bundle
    needs: release-quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Test and build genesis contracts
        run: ./scripts/build-all-contracts.sh --test

      - name: Stage contract artifacts
        run: |
          mkdir -p genesis-contracts/contracts
          while IFS= read -r wasm; do
            dest="genesis-contracts/${wasm}"
            mkdir -p "$(dirname "$dest")"
            cp "$wasm" "$dest"
          done < <(find contracts -maxdepth 2 -type f -name '*.wasm' | sort)
          test "$(find genesis-contracts/contracts -maxdepth 2 -type f -name '*.wasm' | wc -l)" -gt 0

      - name: Upload genesis contract bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: genesis-contracts
          path: genesis-contracts/contracts

  archive-parity-local-gate:
    name: Four-validator hot/cold archive parity gate
    needs: release-quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Install locked user-journey dependencies
        run: npm ci --ignore-scripts

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Build genesis contracts
        run: ./scripts/build-all-contracts.sh

      - name: Build local release validator binaries
        run: cargo build --release --locked -p lichen-validator -p lichen-genesis -p lichen-cli

      - name: Run four-validator hot/cold public-history parity
        run: |
          LICHEN_RUN_LAUNCHPAD_E2E=1 \
          LICHEN_RUN_VOLUME_E2E=1 \
          LICHEN_LOCAL_ARCHIVE_COLD=1 \
          LICHEN_COLD_RETENTION_SLOTS=20 \
          LICHEN_COLD_MIGRATION_INTERVAL_SECS=5 \
          bash tests/local-multi-validator-test.sh 4

  compiler-sandbox-gate:
    name: Compiler sandbox non-root language gate
    needs: release-quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build compiler sandbox image
        run: docker build -f compiler/Dockerfile.sandbox -t lichen-compiler-sandbox:audit .

      - name: Compile Rust, C, and AssemblyScript as non-root
        run: bash scripts/qa/test_compiler_sandbox.sh

  build:
    name: Build ${{ matrix.target }}
    needs: [contract-bundle, archive-parity-local-gate, compiler-sandbox-gate]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: lichen-validator-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: lichen-validator-linux-aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: lichen-validator-darwin-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: lichen-validator-darwin-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: lichen-validator-windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin lichen-validator --bin lichen-genesis --bin lichen --bin zk-prove

      - name: Build Linux service binaries
        if: startsWith(matrix.os, 'ubuntu')
        run: cargo build --release --locked --target ${{ matrix.target }} --bin lichen-custody --bin lichen-faucet

      - name: Download genesis contract bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: genesis-contracts
          path: release-contracts/contracts

      - name: Strip binary (Linux)
        if: startsWith(matrix.os, 'ubuntu') && matrix.target != 'aarch64-unknown-linux-gnu'
        run: |
          strip target/${{ matrix.target }}/release/lichen-validator
          strip target/${{ matrix.target }}/release/lichen-genesis
          strip target/${{ matrix.target }}/release/lichen
          strip target/${{ matrix.target }}/release/zk-prove
          strip target/${{ matrix.target }}/release/lichen-custody
          strip target/${{ matrix.target }}/release/lichen-faucet

      - name: Strip binary (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/lichen-validator
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/lichen-genesis
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/lichen
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/zk-prove
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/lichen-custody
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/lichen-faucet

      - name: Strip binary (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          strip target/${{ matrix.target }}/release/lichen-validator
          strip target/${{ matrix.target }}/release/lichen-genesis
          strip target/${{ matrix.target }}/release/lichen
          strip target/${{ matrix.target }}/release/zk-prove

      - name: Create archive
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p ${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/lichen-validator ${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/lichen-genesis ${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/lichen ${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/zk-prove ${{ matrix.artifact }}/
          for bin in lichen-custody lichen-faucet; do
            if [ -x "target/${{ matrix.target }}/release/$bin" ]; then
              cp "target/${{ matrix.target }}/release/$bin" ${{ matrix.artifact }}/
            fi
          done
          cp seeds.json ${{ matrix.artifact }}/
          cp -R release-contracts/contracts ${{ matrix.artifact }}/contracts
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ${{ matrix.artifact }} | Out-Null
          Copy-Item target/${{ matrix.target }}/release/lichen-validator.exe ${{ matrix.artifact }}/
          Copy-Item target/${{ matrix.target }}/release/lichen-genesis.exe ${{ matrix.artifact }}/
          Copy-Item target/${{ matrix.target }}/release/lichen.exe ${{ matrix.artifact }}/
          Copy-Item target/${{ matrix.target }}/release/zk-prove.exe ${{ matrix.artifact }}/
          Copy-Item seeds.json ${{ matrix.artifact }}/
          Copy-Item release-contracts/contracts ${{ matrix.artifact }}/contracts -Recurse
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Attest archive provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: ${{ matrix.artifact }}.tar.gz

  checksums:
    name: Generate SHA256SUMS
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          sha256sum lichen-validator-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: SHA256SUMS
          path: SHA256SUMS

      - name: Attest checksum provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: SHA256SUMS

  release:
    name: Create Draft GitHub Release
    needs: checksums
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          merge-multiple: true

      - name: List files
        run: ls -la

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          draft: true
          generate_release_notes: true
          files: |
            lichen-validator-linux-x86_64.tar.gz
            lichen-validator-linux-aarch64.tar.gz
            lichen-validator-darwin-x86_64.tar.gz
            lichen-validator-darwin-aarch64.tar.gz
            lichen-validator-windows-x86_64.tar.gz
            SHA256SUMS
          body: |
            ## Lichen Validator ${{ github.ref_name }}

            ### Installation

            Download the archive for your platform, verify the checksum, and extract:

            ```bash
            # Download
            curl -LO https://github.com/lobstercove/lichen/releases/download/${{ github.ref_name }}/lichen-validator-linux-x86_64.tar.gz

            # Verify checksum
            curl -LO https://github.com/lobstercove/lichen/releases/download/${{ github.ref_name }}/SHA256SUMS
            curl -LO https://github.com/lobstercove/lichen/releases/download/${{ github.ref_name }}/SHA256SUMS.sig
            mkdir -p scripts deploy
            curl -fsSLo scripts/verify-release-checksums.mjs https://raw.githubusercontent.com/lobstercove/lichen/${{ github.ref_name }}/scripts/verify-release-checksums.mjs
            curl -fsSLo deploy/release-trust-anchor.json https://raw.githubusercontent.com/lobstercove/lichen/${{ github.ref_name }}/deploy/release-trust-anchor.json
            node scripts/verify-release-checksums.mjs .
            sha256sum -c SHA256SUMS --ignore-missing

            # Verify GitHub artifact provenance (requires GitHub CLI)
            gh attestation verify lichen-validator-linux-x86_64.tar.gz -R lobstercove/lichen

            # Extract
            tar xzf lichen-validator-linux-x86_64.tar.gz --strip-components=1
            chmod +x lichen-validator lichen-genesis lichen zk-prove
            mkdir -p "$HOME/.lichen/state-mainnet"
            cp seeds.json "$HOME/.lichen/state-mainnet/seeds.json"
            ```

            Each archive includes `lichen-validator`, `lichen-genesis`, `lichen`, `zk-prove`,
            `seeds.json`, and the genesis contract WASM bundle under `contracts/`. Linux
            archives also include `lichen-custody` and `lichen-faucet` for VPS service rollouts.
            Install `seeds.json` under your chosen `--db-path` (or `/etc/lichen/seeds.json`)
            so seed-set updates flow through normal release upgrades.

            Fresh validators generate their own identity, fetch the authoritative genesis config
            from seed RPC, import and verify the opcode-41 block-0 state bundle, then replay later
            blocks from peers. Do not copy RocksDB state, genesis wallets, genesis keys, peer cache,
            or consensus WAL from another validator.

            Windows artifact:

            ```powershell
            Invoke-WebRequest -Uri https://github.com/lobstercove/lichen/releases/download/${{ github.ref_name }}/lichen-validator-windows-x86_64.tar.gz -OutFile lichen-validator-windows-x86_64.tar.gz
            tar -xzf .\lichen-validator-windows-x86_64.tar.gz --strip-components=1
            .\lichen-validator.exe --version
            ```

            ### Auto-Update

            Production validators should keep auto-update disabled until this draft has a detached
            `SHA256SUMS.sig` attached and a canary rollout is explicitly approved.

            ### Signature Verification

            After signing (maintainer step):
            ```bash
            # Download signature
            curl -LO https://github.com/lobstercove/lichen/releases/download/${{ github.ref_name }}/SHA256SUMS.sig
            ```

            > **Note:** To add a detached signature, a maintainer should:
            > 1. Download SHA256SUMS from this release
            > 2. Sign it offline using the private maintainer release-signing workflow
            > 3. Upload SHA256SUMS.sig to the release (`SHA256SUMS.sig` is JSON-encoded `PqSignature` data)
            > 4. Publish the release only after the detached signature is attached and the canary gate is approved
