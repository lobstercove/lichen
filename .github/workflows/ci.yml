name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_HTTP_TIMEOUT: "120"
  CARGO_NET_RETRY: "10"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit all Cargo.lock files
        run: |
          set -euo pipefail
          while IFS= read -r lockfile; do
            echo "Auditing ${lockfile}"
            cargo audit -q -D warnings --file "$lockfile"
          done < <(find . -path '*/target' -prune -o -name Cargo.lock -print | sort)

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny
        run: cargo deny check --config deny.toml advisories licenses sources

  js-python-deps:
    name: JS and Python Dependency Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install root npm dependencies from lockfile
        run: npm ci --ignore-scripts
      - name: Audit root npm production dependencies
        run: npm audit --omit=dev
      - name: Install JS SDK dependencies from lockfile
        run: cd sdk/js && npm ci --ignore-scripts
      - name: Audit JS SDK production dependencies
        run: cd sdk/js && npm audit --omit=dev
      - name: Check Python SDK release supply chain
        run: bash scripts/qa/test_python_sdk_release_supply_chain.sh

  expected-contracts:
    name: Expected Contract Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify GitHub Actions supply-chain hardening
        run: node scripts/qa/test_github_actions_supply_chain.js
      - name: Verify RustSec advisory exception policy
        run: node scripts/qa/test_rustsec_advisory_policy.js
      - name: Verify legacy bincode codec policy
        run: node scripts/qa/test_legacy_bincode_codec_policy.js
      - name: Verify release audit summaries
        run: node scripts/qa/test_release_audit_summaries.js
      - name: Verify release signer trust anchor
        run: node scripts/qa/test_release_signer_trust_anchor.js
      - name: Verify deployment env examples
        run: node scripts/qa/test_deployment_env_examples.js
      - name: Verify rolling release custody sequencing
        run: node scripts/qa/test_rolling_release_custody_sequence.js
      - name: Verify DEX frontend wiring
        run: node scripts/qa/test_dex_ui_readiness.js
      - name: Verify frontend RPC parity
        run: node scripts/qa/audit_frontend_rpc_parity.js
      - name: Verify expected contracts lockfile
        run: python3 scripts/qa/update-expected-contracts.py --check

  prediction-market-tests:
    name: Prediction Market Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Run prediction_market tests
        run: cd contracts/prediction_market && cargo test --release

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Run workspace tests
        run: cargo test --workspace
      - name: Reclaim workspace test artifacts
        run: cargo clean
      - name: Run standalone contract tests
        run: |
          set -euo pipefail
          CONTRACT_TARGET_DIR="$GITHUB_WORKSPACE/target/contract-tests"
          mkdir -p "$CONTRACT_TARGET_DIR"
          FAIL=0
          for dir in contracts/*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              name=$(basename "$dir")
              echo "Testing $name..."
              if ! (cd "$dir" && CARGO_TARGET_DIR="$CONTRACT_TARGET_DIR" cargo test 2>&1); then
                echo "❌ FAILED: $name"
                FAIL=1
              fi
              rm -rf "$CONTRACT_TARGET_DIR/debug/incremental"
            fi
          done
          if [ $FAIL -ne 0 ]; then echo "❌ Contract tests failed"; exit 1; fi
      - name: Run local helper guard checks
        run: bash scripts/qa/test_local_helper_guards.sh

  rust-sbom:
    name: Rust SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate workspace Rust SBOM
        run: cargo cyclonedx --manifest-path Cargo.toml --all-features --format json --override-filename lichen-rust-sbom
      - name: Upload Rust SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lichen-rust-sbom
          path: |
            ./lichen-rust-sbom.json
            ./**/lichen-rust-sbom.json
          if-no-files-found: error

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Build validator tooling
        run: cargo build --release --bin lichen-validator --bin lichen-genesis --bin lichen
      - name: Install Node.js dependencies
        run: npm ci --ignore-scripts
      - name: Start validator in background
        run: |
          set -euo pipefail
          export LICHEN_LOCAL_DEV=1
          export LICHEN_KEYPAIR_PASSWORD="${LICHEN_KEYPAIR_PASSWORD:-ci-local-secret}"
          ./run-validator.sh testnet 1 > /tmp/lichen-ci-validator.log 2>&1 &
          echo "$!" > /tmp/lichen-ci-validator.pid

          echo "Waiting for RPC to become ready (ZK setup may take ~30s)..."
          for i in $(seq 1 180); do
            if curl -sf http://localhost:8899 -d '{"jsonrpc":"2.0","id":1,"method":"getHealth"}' -H 'Content-Type: application/json' >/dev/null 2>&1; then
              echo "RPC ready after ${i}s"
              tail -n 80 /tmp/lichen-ci-validator.log || true
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/lichen-ci-validator.pid)" 2>/dev/null; then
              echo "Validator exited before RPC became ready"
              cat /tmp/lichen-ci-validator.log || true
              exit 1
            fi
            sleep 1
          done
          echo "RPC did not become ready in time"
          cat /tmp/lichen-ci-validator.log || true
          exit 1
      - name: Run RPC integration tests
        run: bash scripts/qa/test-rpc-comprehensive.sh
      - name: Run CLI integration tests
        run: bash scripts/qa/test-cli-comprehensive.sh
      - name: Run deterministic E2E smoke tests
        run: node scripts/qa/test_deterministic_e2e_smoke.js
      - name: Run full RPC and DEX REST coverage
        run: node scripts/qa/e2e-rpc-coverage.js
      - name: Stop validator
        if: always()
        run: |
          if [ -f /tmp/lichen-ci-validator.pid ]; then
            kill "$(cat /tmp/lichen-ci-validator.pid)" 2>/dev/null || true
          fi
          pkill -f "validator-supervisor.*testnet-v1-p7001|run-validator.sh testnet 1|lichen-validator" 2>/dev/null || true

  wasm-contracts:
    name: WASM Contract Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          cache-directories: target/wasm32-unknown-unknown
      - name: Build all contracts to WASM
        run: |
          FAIL=0
          for dir in contracts/*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              name=$(basename "$dir")
              echo "Building $name..."
              if ! (cd "$dir" && cargo build --target wasm32-unknown-unknown --release 2>&1); then
                echo "❌ FAILED: $name"
                FAIL=1
              fi
            fi
          done
          if [ $FAIL -ne 0 ]; then echo "❌ WASM build failed"; exit 1; fi

  wallet-extension:
    name: Wallet Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - name: Build JS SDK
        run: cd sdk/js && npm ci --ignore-scripts && npm run build
      - name: Run wallet audits
        run: |
          node scripts/qa/test_wallet_extension_audit.js
          node scripts/qa/test_wallet_audit.js
      - name: Package wallet extension
        run: node scripts/package-wallet-extension.mjs
      - name: Upload wallet extension artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lichen-wallet-extension-package
          path: dist/wallet-extension/*
          if-no-files-found: error

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          tags: lichen-validator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min
